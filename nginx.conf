server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location /assets {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API Gateway routing: remove prefix and pass to Supabase Cloud Run services
    location /auth/v1/ {
        proxy_pass https://groovy-auth-xy3ttffdpq-nw.a.run.app/;
        proxy_set_header Host groovy-auth-xy3ttffdpq-nw.a.run.app;
        proxy_ssl_server_name on;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /rest/v1/ {
        proxy_pass https://groovy-rest-xy3ttffdpq-nw.a.run.app/;
        proxy_set_header Host groovy-rest-xy3ttffdpq-nw.a.run.app;
        proxy_ssl_server_name on;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
