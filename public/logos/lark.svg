<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!-- Lark (Feishu) Logo - Origami bird -->
  <defs>
    <linearGradient id="larkBlue" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#3370FF"/>
      <stop offset="100%" stop-color="#2B5CE6"/>
    </linearGradient>
    <linearGradient id="larkTeal" x1="0.2" y1="0" x2="1" y2="0.8">
      <stop offset="0%" stop-color="#00D6B9"/>
      <stop offset="100%" stop-color="#00C4A8"/>
    </linearGradient>
  </defs>
  <!-- Main blue wing (left/upper) -->
  <path d="M12 52L48 8l20 24L36 68z" fill="url(#larkBlue)"/>
  <!-- Teal wing (right/lower) -->
  <path d="M36 68l32-36 16 20-28 32z" fill="url(#larkTeal)"/>
  <!-- Dark accent (overlap/body) -->
  <path d="M36 68l32-36-4-5-32 36z" fill="#1A5CD6" opacity="0.4"/>
  <!-- Tail feather -->
  <path d="M56 84L84 52l-4-4-28 32z" fill="#00B8A0"/>
</svg>
